<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>30天被动收入-计算器</title>
    <style>
        /* 基础变量定义 */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.85);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background-color: #f8fafc;
            /* 现代系统字体栈 */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            color: var(--text-main);
        }

        /* 纯CSS背景光晕效果 */
        .bg-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }

        /* 卡片主体（磨砂玻璃质感） */
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            animation: cardEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--text-main);
        }

        h1 small {
            font-size: 0.85rem;
            font-weight: 500;
            background: var(--primary-light);
            color: var(--primary-color);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: auto;
            /* 推到最右侧 */
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .field label {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .field label span {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.4rem;
            font-weight: 400;
        }

        /* 输入框容器 */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #ffffff;
            border-radius: 16px;
            border: 2px solid transparent;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02), 0 0 0 1px var(--border-color);
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1), 0 0 0 1px var(--primary-color);
            transform: translateY(-1px);
        }

        .input-wrapper .prefix,
        .input-wrapper .suffix {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-muted);
            user-select: none;
        }

        .input-wrapper .prefix {
            padding-left: 1rem;
            padding-right: 0.5rem;
            width: 2.5rem;
        }

        .input-wrapper .suffix {
            padding-right: 1.2rem;
            padding-left: 0.5rem;
            font-size: 0.9rem;
            background: #f8fafc;
            height: 100%;
            border-left: 1px solid var(--border-color);
        }

        .input-wrapper input {
            flex: 1;
            width: 100%;
            padding: 1rem 0;
            border: none;
            background: transparent;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
            /* 等宽数字，防止输入时抖动 */
            font-variant-numeric: tabular-nums;
        }

        .input-wrapper input::placeholder {
            color: #cbd5e1;
            font-weight: 500;
        }

        /* 隐藏原生数字输入框的上下箭头 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* 结果展示卡片（深色渐变金融风） */
        .result-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 24px;
            padding: 2rem;
            color: #ffffff;
            box-shadow: 0 15px 25px -5px rgba(15, 23, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* 卡片内部装饰光晕 */
        .result-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-20deg);
        }

        .result-label {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .result-value {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
            font-variant-numeric: tabular-nums;
        }

        .result-value .currency {
            font-size: 1.5rem;
            color: #60a5fa;
            font-weight: 600;
        }

        .result-value .sub {
            font-size: 1rem;
            color: #94a3b8;
            font-weight: 500;
            margin-left: 0.2rem;
        }

        .result-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-detail span {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #cbd5e1;
            font-weight: 500;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .card {
                padding: 1.8rem 1.2rem;
                border-radius: 24px;
            }

            h1 {
                font-size: 1.3rem;
                margin-bottom: 1.5rem;
            }

            .input-wrapper input {
                font-size: 1.1rem;
                padding: 0.8rem 0;
            }

            .result-box {
                padding: 1.5rem;
                border-radius: 20px;
            }

            .result-value {
                font-size: 2.4rem;
            }

            .result-value .currency {
                font-size: 1.2rem;
            }

            .result-detail {
                margin-top: 1.2rem;
                padding-top: 1.2rem;
            }

            .result-detail span {
                font-size: 0.75rem;
                padding: 0.25rem 0.6rem;
            }
        }
    </style>
</head>

<body>
    <!-- 背景光晕 -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="card">
        <h1>
            📊 被动收入 · 计算器
            <small>30天</small>
        </h1>

        <div class="input-group">
            <div class="field">
                <label for="principal">💰 理财总金额 <span>(单位：万元)</span></label>
                <div class="input-wrapper">
                    <span class="prefix">¥</span>
                    <input type="number" id="principal" value="1" step="1" min="0" placeholder="0">
                    <span class="suffix">万</span>
                </div>
            </div>

            <div class="field">
                <label for="rate">📈 目标年化利率 <span>(单位：百分比)</span></label>
                <div class="input-wrapper">
                    <span class="prefix">≈</span>
                    <input type="number" id="rate" value="3.65" step="0.1" min="0" placeholder="0.0">
                    <span class="suffix">%</span>
                </div>
            </div>
        </div>

        <!-- 结果卡片 -->
        <div class="result-box" id="resultBox">
            <div class="result-label">
                预计 30 天利息收益
            </div>
            <div class="result-value">
                <span class="currency">¥</span>
                <span id="amountValue">0.00</span>
                <span class="sub">元</span>
            </div>
            <div class="result-detail">
                <span id="detailPrincipal">本金 0 万元</span>
                <span id="detailRate">年化 0%</span>
                <span id="detailDays">周期 30天</span>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const principalInput = document.getElementById('principal');
            const rateInput = document.getElementById('rate');
            const amountSpan = document.getElementById('amountValue');
            const detailPrincipal = document.getElementById('detailPrincipal');
            const detailRate = document.getElementById('detailRate');

            // 用于动画的状态记录
            let currentDisplayAmount = 0;
            let animationFrameId = null;

            // 格式化金额（千分位，保留2位小数）
            function formatMoney(value) {
                let fixed = value.toFixed(2);
                let parts = fixed.split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return parts.join('.');
            }

            // 数字滚动动画缓动函数
            function easeOutQuart(t) {
                return 1 - (--t) * t * t * t;
            }

            // 数字滚动动画核心函数
            function animateValue(targetValue, duration = 400) {
                const startValue = currentDisplayAmount;
                const changeInValue = targetValue - startValue;
                const startTime = performance.now();

                if (animationFrameId) cancelAnimationFrame(animationFrameId);

                function step(currentTime) {
                    let elapsedTime = currentTime - startTime;
                    let progress = elapsedTime / duration;

                    if (progress >= 1) {
                        currentDisplayAmount = targetValue;
                        amountSpan.textContent = formatMoney(targetValue);
                        return;
                    }

                    // 应用缓动效果
                    let easedProgress = easeOutQuart(progress);
                    let currentValue = startValue + (changeInValue * easedProgress);
                    amountSpan.textContent = formatMoney(currentValue);

                    currentDisplayAmount = currentValue;
                    animationFrameId = requestAnimationFrame(step);
                }

                animationFrameId = requestAnimationFrame(step);
            }

            // 核心计算逻辑
            function calculateAndUpdate() {
                let p = parseFloat(principalInput.value);
                let r = parseFloat(rateInput.value);

                // 容错处理
                p = (isNaN(p) || p < 0) ? 0 : p;
                r = (isNaN(r) || r < 0) ? 0 : r;

                // 算法: 本金(转为元) * 年化(百分比转小数) / 365天 * 30天
                const principalYuan = p * 10000;
                const rateDecimal = r / 100;
                const profit = principalYuan * rateDecimal * (30 / 365);

                // 更新底部详情标签
                detailPrincipal.textContent = `本金 ${p} 万元`;
                detailRate.textContent = `年化 ${r}%`;

                // 触发金额滚动动画
                animateValue(profit);
            }

            // 监听输入事件（限制非法字符并实时计算）
            ['input', 'keyup', 'change'].forEach(evt => {
                principalInput.addEventListener(evt, calculateAndUpdate);
                rateInput.addEventListener(evt, calculateAndUpdate);
            });

            // 防止输入 e, -, +
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('keydown', function (e) {
                    if (['e', 'E', '-', '+'].includes(e.key)) {
                        e.preventDefault();
                    }
                });
            });

            // 初始化执行
            calculateAndUpdate();
        })();
    </script>
</body>

</html>
