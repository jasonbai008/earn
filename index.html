<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收益计算器 · 30天收益</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        .card {
            max-width: 580px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 2.5rem 2rem 2.8rem;
            box-shadow: 0 25px 50px -10px rgba(0, 20, 40, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #3b5b7a;
            margin-left: 0.25rem;
            opacity: 0.8;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .field label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f3a57;
            letter-spacing: 0.01em;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .field label span {
            background: #d0e0ed;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1f3a57;
            margin-left: 0.4rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 20px;
            border: 1px solid #dae6f0;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0, 20, 30, 0.02);
        }

        .input-wrapper:focus-within {
            border-color: #2a6b9c;
            box-shadow: 0 4px 12px rgba(27, 85, 140, 0.15);
        }

        .input-wrapper .prefix {
            padding: 0 0 0 1.2rem;
            font-weight: 500;
            color: #2b4b6a;
            font-size: 0.95rem;
            background: transparent;
            pointer-events: none;
            opacity: 0.7;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 0.6rem;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-weight: 500;
            color: #0b1e33;
            outline: none;
            font-family: inherit;
        }

        .input-wrapper input::placeholder {
            color: #b0c8db;
            font-weight: 400;
            opacity: 0.7;
        }

        .input-wrapper .suffix {
            padding-right: 1.2rem;
            font-weight: 500;
            color: #2b4b6a;
            font-size: 0.9rem;
            opacity: 0.7;
            white-space: nowrap;
        }

        .input-wrapper .suffix.strong {
            opacity: 0.9;
            font-weight: 600;
            color: #1f4a74;
        }

        /* 移除 number 箭头 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .result-box {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.8rem 1.8rem 1.8rem 2rem;
            margin: 1.8rem 0 2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 6px 18px rgba(28, 60, 90, 0.06);
        }

        .result-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #2f5579;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .result-value {
            font-size: 2.8rem;
            font-weight: 700;
            color: #0a2840;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-top: 0.35rem;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.2rem 0.6rem;
        }

        .result-value .currency {
            font-size: 1.6rem;
            font-weight: 500;
            color: #2d5c82;
            opacity: 0.8;
        }

        .result-value .sub {
            font-size: 1rem;
            font-weight: 400;
            color: #3e6a8f;
            opacity: 0.7;
        }

        .result-detail {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 0.8rem;
            color: #1d4465;
            font-size: 0.9rem;
            border-top: 1px dashed #d0e2f0;
            padding-top: 0.9rem;
            gap: 0.3rem 1rem;
        }

        .result-detail span {
            background: #e4eff8;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #14436b;
        }

        .action-hint {
            font-size: 0.85rem;
            color: #3e668b;
            background: #dfecf5;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 0.25rem;
            font-weight: 450;
        }

        .footer-note {
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            color: #5a7d9c;
            margin-top: 0.8rem;
            opacity: 0.7;
            border-top: 1px solid #dbe8f2;
            padding-top: 1.2rem;
            letter-spacing: 0.01em;
        }

        .footer-note i {
            font-style: normal;
            background: #dae8f2;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem 1rem 1.8rem;
                border-radius: 28px;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .input-group {
                gap: 1.2rem;
            }

            .result-box {
                padding: 1.2rem;
                margin: 1.5rem 0;
                border-radius: 20px;
            }

            .result-value {
                font-size: 2rem;
            }

            .result-value .currency {
                font-size: 1.2rem;
            }

            .result-value .sub {
                font-size: 0.9rem;
            }

            .result-detail {
                gap: 0.5rem;
                padding-top: 0.8rem;
            }

            .result-detail span {
                font-size: 0.75rem;
                padding: 0.15rem 0.6rem;
            }

            .input-wrapper input {
                font-size: 1rem;
                padding: 0.8rem 0.6rem;
            }

            .input-wrapper .prefix {
                padding-left: 0.8rem;
            }

            .input-wrapper .suffix {
                font-size: 0.8rem;
                padding-right: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>
            📊 被动月收入-计算器
            <small>30天</small>
        </h1>

        <div class="input-group">
            <div class="field">
                <label>
                    💰 理财总金额
                    <span>万元</span>
                </label>
                <div class="input-wrapper">
                    <span class="prefix">¥</span>
                    <input type="number" id="principal" value="1" step="0.1" min="0" placeholder="例如 10">
                    <span class="suffix strong">万元</span>
                </div>
            </div>

            <div class="field">
                <label>
                    📈 年化收益率
                    <span>%</span>
                </label>
                <div class="input-wrapper">
                    <input type="number" id="rate" value="3.65" step="0.01" min="0" placeholder="例如 3.5">
                    <span class="suffix">%</span>
                </div>
            </div>
        </div>

        <!-- 结果卡片 -->
        <div class="result-box" id="resultBox">
            <div class="result-label">
                🗓️ 30天收益
            </div>
            <div class="result-value" id="resultAmount">
                <span class="currency">¥</span>
                <span id="amountValue">30.00</span>
                <span class="sub">元</span>
            </div>
            <div class="result-detail">
                <span id="detailPrincipal">本金 1.00 万元</span>
                <span id="detailRate">年化 3.65%</span>
                <span id="detailDays">📅 30天</span>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // 获取 DOM 元素
            const principalInput = document.getElementById('principal');
            const rateInput = document.getElementById('rate');
            const amountSpan = document.getElementById('amountValue');
            const detailPrincipal = document.getElementById('detailPrincipal');
            const detailRate = document.getElementById('detailRate');
            const detailDays = document.getElementById('detailDays');

            /**
             * 格式化金额：保留两位小数，并添加千分位（整数部分）
             * @param {number} value - 需要格式化的数值
             * @returns {string} 格式化后的字符串
             */
            function formatMoney(value) {
                if (isNaN(value) || !isFinite(value)) return '0.00';
                // 保留两位小数
                let fixed = value.toFixed(2);
                let parts = fixed.split('.');
                let intPart = parts[0];
                let decPart = parts[1];
                // 加千分位
                intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return intPart + '.' + decPart;
            }

            /**
             * 核心计算：根据本金和年化收益率计算30天收益
             * @param {number|string} principalWan - 本金（万元）
             * @param {number|string} annualRatePercent - 年化收益率（%）
             * @returns {Object} 包含收益及原始数据的对象
             */
            function calculate(principalWan, annualRatePercent) {
                // 输入有效性：若为空或非数字，视为0
                const p = parseFloat(principalWan);
                const r = parseFloat(annualRatePercent);
                // 如果输入无效（NaN），视为0；万元转元
                const principalYuan = (isNaN(p) || p < 0) ? 0 : p * 10000;
                // 百分比转小数
                const rateDecimal = (isNaN(r) || r < 0) ? 0 : r / 100;

                // 30天收益 = 本金(元) * 年化利率 * (30/365)
                const days = 30;
                const daysFactor = days / 365;
                const profit = principalYuan * rateDecimal * daysFactor;
                return {
                    profit: profit,
                    principalYuan: principalYuan,
                    ratePercent: isNaN(r) ? 0 : r,
                    days: days,
                    principalWan: isNaN(p) ? 0 : p
                };
            }

            /**
             * 更新 UI 显示
             * 获取当前输入值并触发重新计算，然后更新页面上的数值和详情
             */
            function updateDisplay() {
                // 获取输入值（并去除首尾空格）
                let principalRaw = principalInput.value.trim();
                let rateRaw = rateInput.value.trim();

                let principalNum = parseFloat(principalRaw);
                let rateNum = parseFloat(rateRaw);

                // 如果无法解析，则视为0
                if (isNaN(principalNum) || principalNum < 0) principalNum = 0;
                if (isNaN(rateNum) || rateNum < 0) rateNum = 0;

                // 执行收益计算
                const result = calculate(principalNum, rateNum);
                const profit = result.profit;
                const principalWan = result.principalWan;
                const ratePercent = result.ratePercent;

                // 更新收益金额显示 (带两位小数和千分位)
                amountSpan.textContent = formatMoney(profit);

                // 更新底部详细数据展示
                detailPrincipal.textContent = `本金 ${principalWan.toFixed(2)} 万元`;
                detailRate.textContent = `年化 ${ratePercent.toFixed(2)}%`;
                detailDays.textContent = '📅 30天';
            }

            // 绑定输入事件，实现实时更新
            principalInput.addEventListener('input', updateDisplay);
            rateInput.addEventListener('input', updateDisplay);

            // 初始化显示 (页面加载时根据默认值计算一次)
            updateDisplay();
        })();
    </script>
</body>

</html>
